name: search service ci

on:
  push:
    paths:
      - "search/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/search-ci.yaml"
      - "pom.xml"
  pull_request:
    paths:
      - "search/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/search-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  packages: write

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run Maven Tests
        run: |
          mvn install -pl search -am -DskipTests -Djacoco.skip=true
          mvn clean test -pl search -am
      - name: Upload Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: search-Service-Unit-Test-Results
          path: "search/**/*-reports/TEST*.xml"
          reporter: java-junit
          fail-on-empty: false
      - name: Generate Coverage Report
        run: mvn jacoco:report jacoco:check -pl search
      - name: Upload Coverage to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: search-coverage-report
          path: search/target/site/jacoco/
          if-no-files-found: warn
      - name: Add Coverage Report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' }}
        with:
          paths: ${{github.workspace}}/search/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: "search Coverage Report"
          update-comment: true

      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f search/pom.xml -Dsonar.java.jdkHome=$JAVA_HOME

  Build:
    runs-on: ubuntu-latest
    needs: Test
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Build Maven Package (skip tests)
        run: |
          mvn install -pl search -am -DskipTests -Djacoco.skip=true
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl search -am -Dcheckstyle.output.file=search-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "**/search-checkstyle-result.xml"
      - name: OWASP Dependency Check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: "yas"
          path: "."
          format: "HTML"
          args: >
            --disableCentral
            --disableOssIndex
      - name: Upload OWASP Dependency Check results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: actions/upload-artifact@master
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
      - name: Set container image namespace
        id: image-meta
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          image_namespace="${GHCR_NAMESPACE:-${GITHUB_REPOSITORY_OWNER}}"
          echo "namespace=${image_namespace,,}" >> "$GITHUB_OUTPUT"
        env:
          GHCR_NAMESPACE: ${{ vars.GHCR_NAMESPACE }}

      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./search
          push: true
          tags: ghcr.io/${{ steps.image-meta.outputs.namespace }}/yas-search:latest
