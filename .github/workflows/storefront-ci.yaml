name: storefront service ci

on:
  push:
    paths:
      - "storefront/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-ci.yaml"
  pull_request:
    paths:
      - "storefront/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-ci.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: storefront
      - run: npm run lint
        working-directory: storefront
      - run: npx prettier --check .
        working-directory: storefront
      - run: npm run test --if-present -- --coverage --watchAll=false
        working-directory: storefront
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: storefront-test-results
          path: |
            storefront/junit.xml
            storefront/test-results/
          if-no-files-found: ignore
      - name: Upload Coverage to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storefront-coverage-report
          path: storefront/coverage/
          if-no-files-found: ignore

  Build:
    runs-on: ubuntu-latest
    needs: Test
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: storefront
      - run: npm run build
        working-directory: storefront
      - name: SonarCloud Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: storefront
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Set container image namespace
        id: image-meta
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          image_namespace="${GHCR_NAMESPACE:-${GITHUB_REPOSITORY_OWNER}}"
          echo "namespace=${image_namespace,,}" >> "$GITHUB_OUTPUT"
        env:
          GHCR_NAMESPACE: ${{ vars.GHCR_NAMESPACE }}

      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          push: true
          tags: ghcr.io/${{ steps.image-meta.outputs.namespace }}/yas-storefront:latest
