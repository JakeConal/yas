name: ArgoCD GitOps Updater

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for branches and tags

      - name: Determine Environment and Setup Branch
        id: env_setup
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
             ENV="staging"
             TARGET_BRANCH="env-staging"
             TAG="${GITHUB_REF_NAME}"
             echo "Triggered by tag. Environment: staging. Tag: $TAG"
          else
             ENV="dev"
             TARGET_BRANCH="env-dev"
             TAG="${GITHUB_SHA}"
             echo "Triggered by push to main. Environment: dev. Tag: $TAG"
          fi
          
          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> $GITHUB_ENV
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          
          # Git config
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if target branch exists on remote, if not create it
          if git ls-remote --exit-code --heads origin $TARGET_BRANCH; then
             echo "Branch $TARGET_BRANCH exists. Checking out..."
             git checkout $TARGET_BRANCH
             
             # If staging, we want to bring the exact code from the tag to the staging branch
             if [ "$ENV" == "staging" ]; then
                git merge --strategy-option=theirs ${GITHUB_REF} --no-edit || true
             else
                git merge --strategy-option=theirs origin/main --no-edit || true
             fi
          else
             echo "Branch $TARGET_BRANCH does not exist. Creating..."
             git checkout -b $TARGET_BRANCH
          fi

      - name: Update Helm Values Image Tags
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          python3 -c "
          import os, re, subprocess
          tag = os.environ['IMAGE_TAG']
          docker_user = os.environ.get('DOCKER_USER') or 'nashtech-garage'
          before = os.environ.get('BEFORE_SHA', '')
          after = os.environ.get('AFTER_SHA') or os.environ['IMAGE_TAG']
          service_to_chart = {
              'backoffice': 'backoffice-ui',
              'backoffice-bff': 'backoffice-bff',
              'cart': 'cart',
              'customer': 'customer',
              'inventory': 'inventory',
              'location': 'location',
              'media': 'media',
              'order': 'order',
              'payment': 'payment',
              'payment-paypal': 'payment-paypal',
              'product': 'product',
              'promotion': 'promotion',
              'rating': 'rating',
              'recommendation': 'recommendation',
              'sampledata': 'sampledata',
              'search': 'search',
              'storefront': 'storefront-ui',
              'storefront-bff': 'storefront-bff',
              'tax': 'tax',
              'webhook': 'webhook',
          }
          workflow_to_chart = {
              'backoffice-ci.yaml': 'backoffice-ui',
              'backoffice-bff-ci.yaml': 'backoffice-bff',
              'cart-ci.yaml': 'cart',
              'customer-ci.yaml': 'customer',
              'inventory-ci.yaml': 'inventory',
              'location-ci.yaml': 'location',
              'media-ci.yaml': 'media',
              'order-ci.yaml': 'order',
              'payment-ci.yaml': 'payment',
              'payment-paypal-ci.yaml': 'payment-paypal',
              'product-ci.yaml': 'product',
              'promotion-ci.yaml': 'promotion',
              'rating-ci.yaml': 'rating',
              'recommendation-ci.yaml': 'recommendation',
              'sampledata-ci.yaml': 'sampledata',
              'search-ci.yaml': 'search',
              'storefront-ci.yaml': 'storefront-ui',
              'storefront-bff-ci.yaml': 'storefront-bff',
              'tax-ci.yaml': 'tax',
              'webhook-ci.yaml': 'webhook',
          }
          if before and set(before) != {'0'}:
              diff_range = f'{before}..{after}'
          else:
              diff_range = f'{after}^..{after}'
          changed_files = subprocess.check_output(
              ['git', 'diff', '--name-only', diff_range],
              text=True,
          ).splitlines()
          changed_charts = set()
          for path in changed_files:
              normalized = path.replace('\\\\', '/')
              top_level = normalized.split('/', 1)[0]
              chart = service_to_chart.get(top_level)
              if chart:
                  changed_charts.add(chart)
                  continue
              workflow_prefix = '.github/workflows/'
              if normalized.startswith(workflow_prefix):
                  workflow_name = normalized[len(workflow_prefix):]
                  chart = workflow_to_chart.get(workflow_name)
                  if chart:
                      changed_charts.add(chart)
          if not changed_charts:
              print('No deployable service changes detected; skipping Helm values tag updates.')
              raise SystemExit(0)
          for chart in sorted(changed_charts):
              val_file = os.path.join('k8s/charts', chart, 'values.yaml')
              if os.path.isfile(val_file):
                  with open(val_file, 'r') as f:
                      content = f.read()
                  new_content = re.sub(r'([ \t]*tag:).*', r'\g<1> ' + tag, content)
                  new_content = re.sub(r'ghcr\.io/nashtech-garage', docker_user, new_content)
                  new_content = re.sub(
                      r'asia-southeast1-docker\.pkg\.dev/encoded-antenna-501811-p4/yas-docker',
                      docker_user,
                      new_content,
                   )
                  with open(val_file, 'w') as f:
                      f.write(new_content)
          print('Successfully updated charts: ' + ', '.join(sorted(changed_charts)))
          print('Applied image tag ' + tag + ' and repo namespace ' + docker_user)
          "

      - name: Commit and Push
        run: |
          git add k8s/charts/*/values.yaml
          git commit -m "[skip ci] ArgoCD GitOps: Update $ENV image tags to $IMAGE_TAG" || true
          git push origin $TARGET_BRANCH
