name: ArgoCD GitOps Service Deploy

on:
  workflow_call:
    inputs:
      chart:
        description: Helm chart directory name under k8s/charts
        required: true
        type: string
      image-name:
        description: Docker Hub image name without the namespace
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true

permissions:
  contents: write

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select deployment environment
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "TARGET_BRANCH=env-dev" >> "${GITHUB_ENV}"
            echo "IMAGE_TAG=${GITHUB_SHA}" >> "${GITHUB_ENV}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "TARGET_BRANCH=env-staging" >> "${GITHUB_ENV}"
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          else
            echo "Unsupported deployment ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Update service chart after successful image publish
        shell: bash
        env:
          CHART: ${{ inputs.chart }}
          IMAGE_NAME: ${{ inputs.image-name }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin "${TARGET_BRANCH}"
            git checkout -B gitops-update "origin/${TARGET_BRANCH}"

            values_file="k8s/charts/${CHART}/values.yaml"
            current_tag="$(awk '$1 == "tag:" {print $2; exit}' "${values_file}")"
            current_tag="${current_tag%\"}"
            current_tag="${current_tag#\"}"
            current_tag="${current_tag%\'}"
            current_tag="${current_tag#\'}"
            if git rev-parse --verify "${current_tag}^{commit}" >/dev/null 2>&1 &&
               git merge-base --is-ancestor "${GITHUB_SHA}" "${current_tag}^{commit}"; then
              echo "Skipping stale or duplicate ${CHART} deployment; ${current_tag} is already newer or equal."
              exit 0
            fi

            # Copy only this service's chart from the tested source revision.
            git checkout "${GITHUB_SHA}" -- "k8s/charts/${CHART}"

            python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          chart = os.environ["CHART"]
          image_name = os.environ["IMAGE_NAME"]
          docker_user = os.environ["DOCKER_USER"].lower()
          image_tag = os.environ["IMAGE_TAG"]
          values_file = Path("k8s/charts") / chart / "values.yaml"
          content = values_file.read_text()

          content, repository_updates = re.subn(
              r"^(\s+repository:)\s*.*$",
              rf"\1 {docker_user}/{image_name}",
              content,
              count=1,
              flags=re.MULTILINE,
          )
          content, tag_updates = re.subn(
              r"^(\s+tag:)\s*.*$",
              rf"\1 {image_tag}",
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if repository_updates != 1 or tag_updates != 1:
              raise SystemExit(f"Could not update image coordinates in {values_file}")

          values_file.write_text(content)
          PY

            git add "k8s/charts/${CHART}"
            if git diff --cached --quiet; then
              echo "${CHART} already points to ${IMAGE_TAG}; nothing to deploy."
              exit 0
            fi

            git commit -m "[skip ci] deploy ${CHART} ${IMAGE_TAG} to ${TARGET_BRANCH}"
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              echo "Updated ${CHART} on ${TARGET_BRANCH}."
              exit 0
            fi

            echo "Concurrent GitOps update detected; retrying (${attempt}/5)."
            sleep $((attempt * 2))
          done

          echo "Unable to update ${TARGET_BRANCH} after 5 attempts." >&2
          exit 1
