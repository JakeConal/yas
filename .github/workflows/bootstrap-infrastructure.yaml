name: Bootstrap Developer Infrastructure

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Infrastructure required by the developer build"
        required: true
        type: choice
        options:
          - product
          - full
        default: product
      confirm_apply:
        description: "Type APPLY to confirm"
        required: true
        type: string

jobs:
  bootstrap:
    name: Install infrastructure directly with Helm
    runs-on: self-hosted
    if: ${{ inputs.confirm_apply == 'APPLY' }}
    env:
      PROFILE: ${{ inputs.profile }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tools and cluster access
        shell: bash
        run: |
          set -euo pipefail
          kubectl version --client
          helm version
          kubectl auth can-i create namespaces | grep -q '^yes$'

      - name: Configure Helm repositories
        shell: bash
        run: |
          set -euo pipefail
          helm repo add postgres-operator https://opensource.zalando.com/postgres-operator/charts/postgres-operator
          helm repo add strimzi https://strimzi.io/charts/
          helm repo add elastic https://helm.elastic.co
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Install operators directly
        shell: bash
        run: |
          set -euo pipefail
          helm upgrade --install postgres-operator postgres-operator/postgres-operator \
            --version 1.14.0 --namespace postgres --create-namespace --wait --timeout 10m
          helm upgrade --install strimzi-kafka-operator strimzi/strimzi-kafka-operator \
            --version 0.49.0 --namespace kafka --create-namespace --wait --timeout 10m
          helm upgrade --install elastic-operator elastic/eck-operator \
            --version 3.1.0 --namespace elasticsearch --create-namespace --wait --timeout 10m

      - name: Install Product dependencies directly
        shell: bash
        run: |
          set -euo pipefail
          helm upgrade --install postgres-cluster k8s/deploy/postgres/postgresql \
            --namespace postgres --create-namespace --wait --timeout 15m
          helm upgrade --install kafka-cluster k8s/deploy/kafka/kafka-cluster \
            --namespace kafka --create-namespace --wait --timeout 20m
          helm upgrade --install elasticsearch-cluster k8s/deploy/elasticsearch/elasticsearch-cluster \
            --namespace elasticsearch --create-namespace --wait --timeout 20m

      - name: Install full-system dependencies directly
        if: ${{ inputs.profile == 'full' }}
        shell: bash
        run: |
          set -euo pipefail
          helm upgrade --install redis bitnami/redis --version 27.0.14 \
            --namespace redis --create-namespace --set auth.password=redis --wait --timeout 15m
          helm upgrade --install zookeeper k8s/deploy/zookeeper \
            --namespace zookeeper --create-namespace --wait --timeout 15m

          kubectl create namespace keycloak --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n keycloak -f https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/26.0.2/kubernetes/keycloaks.k8s.keycloak.org-v1.yml
          kubectl apply -n keycloak -f https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/26.0.2/kubernetes/keycloakrealmimports.k8s.keycloak.org-v1.yml
          kubectl apply -n keycloak -f https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/26.0.2/kubernetes/kubernetes.yml
          kubectl rollout status deployment/keycloak-operator -n keycloak --timeout=10m
          helm upgrade --install keycloak k8s/deploy/keycloak/keycloak \
            --namespace keycloak --create-namespace --wait --timeout 15m

      - name: Show installed infrastructure
        shell: bash
        run: |
          set -euo pipefail
          helm list --all-namespaces
          kubectl get pods -n postgres
          kubectl get pods -n kafka
          kubectl get pods -n elasticsearch
          if [ "$PROFILE" = "full" ]; then
            kubectl get pods -n redis
            kubectl get pods -n zookeeper
            kubectl get pods -n keycloak
          fi
