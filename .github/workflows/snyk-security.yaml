name: Snyk Security Scan

on:
  push:
    paths:
      - "**/pom.xml"
      - "**/package.json"
      - "**/package-lock.json"
      - ".github/workflows/snyk-security.yaml"
  pull_request:
    paths:
      - "**/pom.xml"
      - "**/package.json"
      - "**/package-lock.json"
      - ".github/workflows/snyk-security.yaml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  detect-changed-services:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      java-services: ${{ steps.changed-services.outputs.java-services }}
      node-services: ${{ steps.changed-services.outputs.node-services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changed-services
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          all_java_services=(
            product
            cart
            order
            media
            customer
            inventory
            location
            payment
            payment-paypal
            promotion
            rating
            search
            tax
            webhook
            recommendation
            sampledata
            delivery
            backoffice-bff
            storefront-bff
          )
          all_node_services=(storefront backoffice)

          to_json() {
            python3 -c 'import json, sys; print(json.dumps(sys.argv[1:]))' "$@"
          }

          java_services=()
          node_services=()

          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$EVENT_NAME" == "schedule" ]]; then
            java_services=("${all_java_services[@]}")
            node_services=("${all_node_services[@]}")
          else
            empty_tree_sha="$(git hash-object -t tree /dev/null)"
            if [[ -z "$BASE_SHA" || "$BASE_SHA" == 0000000000000000000000000000000000000000 ]]; then
              BASE_SHA="$empty_tree_sha"
            fi

            changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

            if grep -qx ".github/workflows/snyk-security.yaml" <<< "$changed_files"; then
              java_services=("${all_java_services[@]}")
              node_services=("${all_node_services[@]}")
            elif grep -Eq "^(pom.xml|common-library/pom.xml)$" <<< "$changed_files"; then
              java_services=("${all_java_services[@]}")
            else
              for service in "${all_java_services[@]}"; do
                if grep -Eq "^${service}/pom.xml$" <<< "$changed_files"; then
                  java_services+=("$service")
                fi
              done

              for service in "${all_node_services[@]}"; do
                if grep -Eq "^${service}/(package.json|package-lock.json)$" <<< "$changed_files"; then
                  node_services+=("$service")
                fi
              done
            fi
          fi

          echo "java-services=$(to_json "${java_services[@]}")" >> "$GITHUB_OUTPUT"
          echo "node-services=$(to_json "${node_services[@]}")" >> "$GITHUB_OUTPUT"

  snyk-java-services:
    name: Snyk Java - ${{ matrix.service }}
    needs: detect-changed-services
    if: ${{ needs.detect-changed-services.outputs.java-services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changed-services.outputs.java-services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/workflows/actions

      - name: Configure Maven mirror
        run: |
          mkdir -p ~/.m2
          cat <<'EOF' > ~/.m2/settings.xml
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>central-mirror</id>
                <name>Central Mirror</name>
                <url>https://repo1.maven.org/maven2/</url>
                <mirrorOf>central</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Build project (compile only)
        run: |
          set -e
          for attempt in 1 2 3; do
            if mvn -U -ntp compile -pl ${{ matrix.service }} -am -DskipTests; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Maven compile failed after 3 attempts."
              exit 1
            fi

            echo "Maven compile attempt $attempt failed. Retrying..."
            sleep 15
          done

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Prepare Maven wrapper for Snyk
        working-directory: ${{ matrix.service }}
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x ./mvnw
          else
            cat <<'EOF' > ./mvnw
            #!/usr/bin/env bash
            exec mvn "$@"
            EOF
            chmod +x ./mvnw
          fi

      - name: Run Snyk for Maven service
        working-directory: ${{ matrix.service }}
        run: |
          set -e
          for attempt in 1 2 3; do
            if snyk test --file=pom.xml --severity-threshold=high --sarif-file-output=snyk.sarif; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Snyk test failed after 3 attempts. Running debug mode for diagnostics..."
              snyk test -d --file=pom.xml --severity-threshold=high --sarif-file-output=snyk.sarif || true
              exit 1
            fi

            echo "Snyk test attempt $attempt failed. Retrying..."
            sleep 15
          done
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk SARIF
        if: always() && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: snyk.sarif
          category: snyk-maven-${{ matrix.service }}

  snyk-node-services:
    name: Snyk Node - ${{ matrix.service }}
    needs: detect-changed-services
    if: ${{ needs.detect-changed-services.outputs.node-services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changed-services.outputs.node-services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Run Snyk for Node service
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=${{ matrix.service }}/package.json --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF
        if: always() && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: snyk.sarif
          category: snyk-node-${{ matrix.service }}
