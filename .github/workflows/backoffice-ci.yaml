name: backoffice service ci

on:
  push:
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  pull_request:
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: backoffice
      - run: npm run lint
        working-directory: backoffice
      - run: npx prettier --check .
        working-directory: backoffice
      - run: npm run test --if-present -- --coverage --watchAll=false
        working-directory: backoffice
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: backoffice-test-results
          path: |
            backoffice/junit.xml
            backoffice/test-results/
          if-no-files-found: ignore
      - name: Upload Coverage to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backoffice-coverage-report
          path: backoffice/coverage/
          if-no-files-found: ignore

  Build:
    runs-on: ubuntu-latest
    needs: Test
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: backoffice
      - run: npm run build
        working-directory: backoffice
      - run: npm audit --omit=dev
        continue-on-error: true
        working-directory: backoffice
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./backoffice"
          format: "sarif"
          output: "trivy-results.sarif"
      - name: SonarCloud Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: backoffice
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Set container image namespace
        id: image-meta
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          image_namespace="${GHCR_NAMESPACE:-${GITHUB_REPOSITORY_OWNER}}"
          echo "namespace=${image_namespace,,}" >> "$GITHUB_OUTPUT"
        env:
          GHCR_NAMESPACE: ${{ vars.GHCR_NAMESPACE }}

      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice
          tags: ghcr.io/${{ steps.image-meta.outputs.namespace }}/yas-backoffice:latest
      - name: Run Trivy vulnerability scanner
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/${{ steps.image-meta.outputs.namespace }}/yas-backoffice:latest"
          format: "sarif"
          output: "trivy-results.sarif"
      - name: Push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./backoffice
          tags: ghcr.io/${{ steps.image-meta.outputs.namespace }}/yas-backoffice:latest
      - name: Upload Trivy scan results to GitHub Security tab
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
