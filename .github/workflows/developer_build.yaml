name: Deploy Developer Preview

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: Service whose branch image will be built and deployed
        required: true
        type: choice
        options:
          - cart
          - customer
          - inventory
          - location
          - media
          - order
          - payment
          - payment-paypal
          - product
          - promotion
          - rating
          - recommendation
          - sampledata
          - search
          - tax
          - webhook
          - storefront-bff
          - backoffice-bff
          - storefront
          - backoffice
      git_ref:
        description: Branch, tag, or commit to test
        required: true
        type: string
        default: main
      developer_id:
        description: Lowercase owner id, for example hieu or team-a
        required: true
        type: string
      preview_id:
        description: Feature or PR id, for example pr-42
        required: true
        type: string
        default: demo
      profile:
        description: Application slice to deploy in the isolated namespace
        required: true
        type: choice
        default: service
        options:
          - service
          - storefront
          - backoffice

permissions:
  contents: read
  id-token: write

# A preview id represents one mutable environment. Runs for different previews can proceed together.
concurrency:
  group: developer-preview-${{ inputs.developer_id }}-${{ inputs.preview_id }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy ${{ inputs.service_name }} preview
    runs-on: ubuntu-latest
    environment: developer-preview
    steps:
      - name: Checkout requested revision
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate inputs and calculate preview identity
        id: preview
        shell: bash
        env:
          SERVICE: ${{ inputs.service_name }}
          DEVELOPER: ${{ inputs.developer_id }}
          PREVIEW_ID: ${{ inputs.preview_id }}
        run: |
          set -euo pipefail

          validate_dns_label() {
            local value="$1"
            [[ "$value" =~ ^[a-z0-9]([a-z0-9-]{0,22}[a-z0-9])?$ ]] || {
              echo "'$value' must be a lowercase DNS label up to 24 characters."
              exit 1
            }
          }

          validate_dns_label "$DEVELOPER"
          validate_dns_label "$PREVIEW_ID"

          case "$SERVICE" in
            storefront)
              echo "source_dir=storefront" >> "$GITHUB_OUTPUT"
              echo "chart=storefront-ui" >> "$GITHUB_OUTPUT"
              echo "image_name=yas-storefront" >> "$GITHUB_OUTPUT"
              echo "component=ui" >> "$GITHUB_OUTPUT"
              ;;
            backoffice)
              echo "source_dir=backoffice" >> "$GITHUB_OUTPUT"
              echo "chart=backoffice-ui" >> "$GITHUB_OUTPUT"
              echo "image_name=yas-backoffice" >> "$GITHUB_OUTPUT"
              echo "component=ui" >> "$GITHUB_OUTPUT"
              ;;
            *)
              test -d "$SERVICE"
              test -d "k8s/charts/$SERVICE"
              echo "source_dir=$SERVICE" >> "$GITHUB_OUTPUT"
              echo "chart=$SERVICE" >> "$GITHUB_OUTPUT"
              echo "image_name=yas-$SERVICE" >> "$GITHUB_OUTPUT"
              echo "component=backend" >> "$GITHUB_OUTPUT"
              ;;
          esac

          namespace="preview-${DEVELOPER}-${PREVIEW_ID}"
          host="preview-${DEVELOPER}-${PREVIEW_ID}.yas.local.com"
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"
          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "image_tag=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run target service tests
        shell: bash
        env:
          SOURCE_DIR: ${{ steps.preview.outputs.source_dir }}
          COMPONENT: ${{ steps.preview.outputs.component }}
        run: |
          set -euo pipefail
          if [ "$COMPONENT" = "ui" ]; then
            (
              cd "$SOURCE_DIR"
              npm ci
              npm run test --if-present -- --watchAll=false
            )
          else
            mvn clean test -pl "$SOURCE_DIR" -am
            # Backend Dockerfiles copy the packaged Spring Boot JAR from target/.
            mvn package -DskipTests -pl "$SOURCE_DIR" -am
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push immutable preview image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.preview.outputs.source_dir }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.preview.outputs.image_name }}:${{ steps.preview.outputs.image_tag }}

      - name: Authenticate to Google Cloud with Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_LOCATION }}

      - name: Create preview foundation
        shell: bash
        env:
          NAMESPACE: ${{ steps.preview.outputs.namespace }}
          DEVELOPER: ${{ inputs.developer_id }}
          PREVIEW_ID: ${{ inputs.preview_id }}
        run: |
          set -euo pipefail
          helm upgrade --install preview-foundation k8s/charts/developer-preview \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set-string preview.owner="$DEVELOPER" \
            --set-string preview.id="$PREVIEW_ID" \
            --atomic --wait --timeout 5m
          kubectl label namespace "$NAMESPACE" \
            yas.io/managed-by=developer-preview \
            yas.io/owner="$DEVELOPER" \
            yas.io/preview-id="$PREVIEW_ID" \
            --overwrite

      - name: Deploy configuration shared by the preview slice
        shell: bash
        env:
          NAMESPACE: ${{ steps.preview.outputs.namespace }}
        run: |
          set -euo pipefail
          helm dependency build k8s/charts/yas-configuration
          helm upgrade --install yas-configuration k8s/charts/yas-configuration \
            --namespace "$NAMESPACE" \
            --set reloader.reloader.watchGlobally=false \
            --set reloader.reloader.enableHA=false \
            --atomic --wait --timeout 10m

      - name: Deploy application slice
        shell: bash
        env:
          SERVICE: ${{ inputs.service_name }}
          PROFILE: ${{ inputs.profile }}
          NAMESPACE: ${{ steps.preview.outputs.namespace }}
          HOST: ${{ steps.preview.outputs.host }}
          TARGET_CHART: ${{ steps.preview.outputs.chart }}
          TARGET_COMPONENT: ${{ steps.preview.outputs.component }}
          TARGET_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.preview.outputs.image_name }}
          TARGET_TAG: ${{ steps.preview.outputs.image_tag }}
        run: |
          set -euo pipefail

          charts=("$TARGET_CHART")
          case "$PROFILE" in
            service) ;;
            storefront) charts+=(storefront-bff storefront-ui) ;;
            backoffice) charts+=(backoffice-bff backoffice-ui) ;;
            *) echo "Unsupported profile: $PROFILE"; exit 1 ;;
          esac

          declare -A seen
          deploy_chart() {
            local chart="$1"
            local -a parameters=(
              --set-string backend.resources.requests.cpu=100m
              --set-string backend.resources.requests.memory=512Mi
              --set-string backend.resources.limits.cpu=1
              --set-string backend.resources.limits.memory=1Gi
              --set-string ui.resources.requests.cpu=50m
              --set-string ui.resources.requests.memory=128Mi
              --set-string ui.resources.limits.cpu=500m
              --set-string ui.resources.limits.memory=256Mi
            )

            if [ "$chart" = "$TARGET_CHART" ]; then
              if [ "$TARGET_COMPONENT" = "ui" ]; then
                parameters+=(--set ui.image.repository="$TARGET_IMAGE" --set-string ui.image.tag="$TARGET_TAG")
              else
                parameters+=(--set backend.image.repository="$TARGET_IMAGE" --set-string backend.image.tag="$TARGET_TAG")
              fi
            fi

            if [ "$PROFILE" = "service" ] && [ "$chart" = "$TARGET_CHART" ]; then
              if [ "$TARGET_COMPONENT" = "ui" ]; then
                parameters+=(--set ui.ingress.enabled=true --set-string ui.ingress.host="$HOST")
              else
                parameters+=(--set backend.ingress.enabled=true --set-string backend.ingress.host="$HOST")
              fi
            fi

            if [ "$PROFILE" = "storefront" ] && [ "$chart" = "storefront-bff" ]; then
              parameters+=(--set backend.ingress.enabled=true --set-string backend.ingress.host="$HOST")
            fi
            if [ "$PROFILE" = "backoffice" ] && [ "$chart" = "backoffice-bff" ]; then
              parameters+=(--set backend.ingress.enabled=true --set-string backend.ingress.host="$HOST")
            fi

            helm dependency build "k8s/charts/$chart"
            helm upgrade --install "$chart" "k8s/charts/$chart" \
              --namespace "$NAMESPACE" \
              "${parameters[@]}" \
              --atomic --wait --timeout 12m
          }

          for chart in "${charts[@]}"; do
            if [[ -z "${seen[$chart]:-}" ]]; then
              seen[$chart]=1
              deploy_chart "$chart"
            fi
          done

      - name: Verify preview and publish access details
        shell: bash
        env:
          NAMESPACE: ${{ steps.preview.outputs.namespace }}
          HOST: ${{ steps.preview.outputs.host }}
        run: |
          set -euo pipefail
          while IFS= read -r deployment; do
            kubectl rollout status "$deployment" -n "$NAMESPACE" --timeout=10m
          done < <(kubectl get deployment -n "$NAMESPACE" -o name)
          kubectl get pods,svc,ingress -n "$NAMESPACE"
          {
            echo "## Developer preview is ready"
            echo
            echo "- Namespace: \`$NAMESPACE\`"
            echo "- URL: \`http://$HOST\`"
            echo "- Delete it with the **Delete Developer Preview** workflow using the same developer_id and preview_id."
            echo "- If yas.local.com is not wildcard-mapped in DNS, add the ingress IP and \`$HOST\` to the local hosts file before opening the URL."
          } >> "$GITHUB_STEP_SUMMARY"
