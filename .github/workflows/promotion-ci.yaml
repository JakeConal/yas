name: promotion service ci

on:
  push:
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
      - "pom.xml"
  pull_request:
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  packages: write

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run Maven Tests
        run: |
          mvn install -pl promotion -am -DskipTests -Djacoco.skip=true
          mvn clean test -pl promotion -am
      - name: Upload Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: promotion-Service-Unit-Test-Results
          path: "promotion/**/*-reports/TEST*.xml"
          reporter: java-junit
          fail-on-empty: false
      - name: Generate Coverage Report
        run: mvn jacoco:report jacoco:check -pl promotion
      - name: Upload Coverage to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: promotion-coverage-report
          path: promotion/target/site/jacoco/
          if-no-files-found: warn
      - name: Add Coverage Report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' }}
        with:
          paths: ${{github.workspace}}/promotion/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: "promotion Coverage Report"
          update-comment: true

      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f promotion/pom.xml -Dsonar.java.jdkHome=$JAVA_HOME

  Build:
    runs-on: ubuntu-latest
    needs: Test
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Build Maven Package (skip tests)
        run: |
          mvn install -pl promotion -am -DskipTests -Djacoco.skip=true
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl promotion -am -Dcheckstyle.output.file=promotion-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "**/promotion-checkstyle-result.xml"
      - name: OWASP Dependency Check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: "yas"
          path: "."
          format: "HTML"
          args: >
            --disableCentral
            --disableOssIndex
      - name: Upload OWASP Dependency Check results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: actions/upload-artifact@master
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
      - name: Publish commit image to Docker Hub
        if: ${{ github.event_name == 'push' }}
        uses: ./.github/actions/docker-publish
        with:
          context: ./promotion
          image-name: yas-promotion
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
