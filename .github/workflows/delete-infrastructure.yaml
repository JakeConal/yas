name: Delete Infrastructure

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Infrastructure scope to delete"
        required: true
        type: choice
        options:
          - all
          - service-mesh
          - access-services
          - observability
          - data-services
          - operators
        default: all
      confirm_delete:
        description: "Type DELETE_INFRASTRUCTURE to confirm destructive deletion"
        required: true
        type: string

jobs:
  delete:
    name: Delete ArgoCD infrastructure applications
    runs-on: self-hosted
    if: ${{ inputs.confirm_delete == 'DELETE_INFRASTRUCTURE' }}
    env:
      SCOPE: ${{ inputs.scope }}
    steps:
      - name: Validate cluster access
        run: |
          set -euo pipefail
          kubectl version --client
          kubectl get namespace argocd
          kubectl get crd applications.argoproj.io

      - name: Delete selected infrastructure applications
        run: |
          set -euo pipefail

          delete_app() {
            local app="$1"
            if ! kubectl get application "$app" -n argocd >/dev/null 2>&1; then
              echo "Application $app not found, skipping."
              return 0
            fi

            echo "Deleting $app and pruning managed resources"
            kubectl patch application "$app" -n argocd --type merge \
              -p '{"metadata":{"finalizers":["resources-finalizer.argocd.argoproj.io"]}}'
            kubectl delete application "$app" -n argocd --wait=false
          }

          delete_many() {
            for app in "$@"; do
              delete_app "$app"
            done
          }

          case "$SCOPE" in
            service-mesh)
              delete_many yas-mesh-policies kiali istiod istio-base
              ;;
            access-services)
              delete_many keycloak
              ;;
            observability)
              delete_many opentelemetry-collector grafana-resources grafana-operator prometheus promtail tempo loki
              ;;
            data-services)
              delete_many zookeeper redis elasticsearch-cluster akhq kafka-cluster pgadmin postgres-cluster
              ;;
            operators)
              delete_many keycloak-operator opentelemetry-operator cert-manager elastic-operator strimzi-kafka-operator postgres-operator ingress-nginx
              ;;
            all)
              delete_many yas-mesh-policies kiali istiod istio-base
              delete_many keycloak
              delete_many opentelemetry-collector grafana-resources grafana-operator prometheus promtail tempo loki
              delete_many zookeeper redis elasticsearch-cluster akhq kafka-cluster pgadmin postgres-cluster
              delete_many keycloak-operator opentelemetry-operator cert-manager elastic-operator strimzi-kafka-operator postgres-operator ingress-nginx
              ;;
            *)
              echo "Unknown scope: $SCOPE"
              exit 1
              ;;
          esac

      - name: Wait for application deletion
        run: |
          set -euo pipefail

          wait_deleted() {
            local app="$1"
            for i in $(seq 1 60); do
              if ! kubectl get application "$app" -n argocd >/dev/null 2>&1; then
                echo "$app deleted"
                return 0
              fi
              echo "Waiting for $app deletion"
              sleep 10
            done
            echo "Timed out waiting for $app deletion"
            kubectl get application "$app" -n argocd -o wide || true
            exit 1
          }

          wait_many_deleted() {
            for app in "$@"; do
              wait_deleted "$app"
            done
          }

          case "$SCOPE" in
            service-mesh)
              wait_many_deleted yas-mesh-policies kiali istiod istio-base
              ;;
            access-services)
              wait_many_deleted keycloak
              ;;
            observability)
              wait_many_deleted opentelemetry-collector grafana-resources grafana-operator prometheus promtail tempo loki
              ;;
            data-services)
              wait_many_deleted zookeeper redis elasticsearch-cluster akhq kafka-cluster pgadmin postgres-cluster
              ;;
            operators)
              wait_many_deleted keycloak-operator opentelemetry-operator cert-manager elastic-operator strimzi-kafka-operator postgres-operator ingress-nginx
              ;;
            all)
              wait_many_deleted yas-mesh-policies kiali istiod istio-base
              wait_many_deleted keycloak
              wait_many_deleted opentelemetry-collector grafana-resources grafana-operator prometheus promtail tempo loki
              wait_many_deleted zookeeper redis elasticsearch-cluster akhq kafka-cluster pgadmin postgres-cluster
              wait_many_deleted keycloak-operator opentelemetry-operator cert-manager elastic-operator strimzi-kafka-operator postgres-operator ingress-nginx
              ;;
          esac

