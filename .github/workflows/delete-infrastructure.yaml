name: Delete Developer Infrastructure

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Developer infrastructure to remove"
        required: true
        type: choice
        options:
          - product
          - full
        default: product
      delete_namespaces:
        description: "Also delete infrastructure namespaces and persistent data"
        required: true
        type: boolean
        default: false
      confirm_delete:
        description: "Type DELETE_DEVELOPER_INFRA to confirm"
        required: true
        type: string

jobs:
  delete:
    name: Uninstall directly managed infrastructure
    runs-on: self-hosted
    if: ${{ inputs.confirm_delete == 'DELETE_DEVELOPER_INFRA' }}
    env:
      PROFILE: ${{ inputs.profile }}
      DELETE_NAMESPACES: ${{ inputs.delete_namespaces }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tools and cluster access
        shell: bash
        run: |
          set -euo pipefail
          kubectl version --client
          helm version

      - name: Uninstall application dependencies
        shell: bash
        run: |
          set -euo pipefail
          uninstall_release() {
            local release="$1"
            local namespace="$2"
            if helm status "$release" -n "$namespace" >/dev/null 2>&1; then
              helm uninstall "$release" -n "$namespace" --wait --timeout 10m
            else
              echo "Helm release $namespace/$release does not exist; skipping."
            fi
          }

          if [ "$PROFILE" = "full" ]; then
            uninstall_release keycloak keycloak
            kubectl delete -n keycloak -f https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/26.0.2/kubernetes/kubernetes.yml --ignore-not-found=true || true
            uninstall_release zookeeper zookeeper
            uninstall_release redis redis
          fi

          uninstall_release elasticsearch-cluster elasticsearch
          uninstall_release kafka-cluster kafka
          uninstall_release postgres-cluster postgres

      - name: Uninstall operators
        shell: bash
        run: |
          set -euo pipefail
          uninstall_release() {
            local release="$1"
            local namespace="$2"
            if helm status "$release" -n "$namespace" >/dev/null 2>&1; then
              helm uninstall "$release" -n "$namespace" --wait --timeout 10m
            else
              echo "Helm release $namespace/$release does not exist; skipping."
            fi
          }

          uninstall_release elastic-operator elasticsearch
          uninstall_release strimzi-kafka-operator kafka
          uninstall_release postgres-operator postgres

      - name: Optionally delete namespaces and persistent data
        if: ${{ inputs.delete_namespaces }}
        shell: bash
        run: |
          set -euo pipefail
          namespaces=(postgres kafka elasticsearch)
          if [ "$PROFILE" = "full" ]; then
            namespaces+=(redis zookeeper keycloak)
          fi
          kubectl delete namespace "${namespaces[@]}" --ignore-not-found=true --wait=false

      - name: Show remaining releases
        shell: bash
        run: helm list --all-namespaces
