name: Delete Developer Preview

on:
  workflow_dispatch:
    inputs:
      developer_id:
        description: Owner used when the preview was deployed
        required: true
        type: string
      preview_id:
        description: Feature or PR id used when the preview was deployed
        required: true
        type: string
      confirm_delete:
        description: Type DELETE_PREVIEW to confirm namespace deletion
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: developer-preview-${{ inputs.developer_id }}-${{ inputs.preview_id }}
  cancel-in-progress: false

jobs:
  delete:
    if: ${{ inputs.confirm_delete == 'DELETE_PREVIEW' }}
    runs-on: ubuntu-latest
    environment: developer-preview
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate preview identity
        id: preview
        shell: bash
        env:
          DEVELOPER: ${{ inputs.developer_id }}
          PREVIEW_ID: ${{ inputs.preview_id }}
        run: |
          set -euo pipefail
          validate_dns_label() {
            local value="$1"
            [[ "$value" =~ ^[a-z0-9]([a-z0-9-]{0,22}[a-z0-9])?$ ]] || {
              echo "'$value' must be a lowercase DNS label up to 24 characters."
              exit 1
            }
          }
          validate_dns_label "$DEVELOPER"
          validate_dns_label "$PREVIEW_ID"
          echo "namespace=preview-${DEVELOPER}-${PREVIEW_ID}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud with Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_LOCATION }}

      - name: Delete only the matching preview namespace
        shell: bash
        env:
          NAMESPACE: ${{ steps.preview.outputs.namespace }}
          DEVELOPER: ${{ inputs.developer_id }}
          PREVIEW_ID: ${{ inputs.preview_id }}
        run: |
          set -euo pipefail
          case "$NAMESPACE" in preview-*) ;; *) echo "Refusing non-preview namespace"; exit 1 ;; esac

          if ! kubectl get namespace "$NAMESPACE" >/dev/null 2>&1; then
            echo "Preview namespace $NAMESPACE does not exist; nothing to delete."
            exit 0
          fi

          managed_by=$(kubectl get namespace "$NAMESPACE" -o jsonpath='{.metadata.labels.yas\.io/managed-by}')
          owner=$(kubectl get namespace "$NAMESPACE" -o jsonpath='{.metadata.labels.yas\.io/owner}')
          preview=$(kubectl get namespace "$NAMESPACE" -o jsonpath='{.metadata.labels.yas\.io/preview-id}')
          test "$managed_by" = "developer-preview"
          test "$owner" = "$DEVELOPER"
          test "$preview" = "$PREVIEW_ID"

          kubectl delete namespace "$NAMESPACE" --wait=false
          echo "Deletion requested for $NAMESPACE. Shared infrastructure namespaces were not modified."
