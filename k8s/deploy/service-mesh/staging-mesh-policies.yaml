apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: staging-strict-mtls
  namespace: staging
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: staging-cart-metrics-plaintext
  namespace: staging
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cart
  portLevelMtls:
    80:
      mode: PERMISSIVE
    8090:
      mode: DISABLE
---
