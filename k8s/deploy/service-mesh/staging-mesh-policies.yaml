---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: staging-search-allow-product-and-storefront-bff
  namespace: staging
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: search
  action: ALLOW
  rules:
    - to:
        - operation:
            ports:
              - "80"
            paths:
              - /search/v3/api-docs*
              - /v3/api-docs*
    - from:
        - source:
            principals:
              - cluster.local/ns/staging/sa/product
              - cluster.local/ns/staging/sa/storefront-bff
      to:
        - operation:
            ports:
              - "80"
              - "8090"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: staging-product-allow-storefront-bff
  namespace: staging
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    - to:
        - operation:
            ports:
              - "80"
            paths:
              - /product/v3/api-docs*
              - /v3/api-docs*
    - from:
        - source:
            principals:
              - cluster.local/ns/staging/sa/storefront-bff
              - cluster.local/ns/staging/sa/backoffice-bff
              - cluster.local/ns/staging/sa/order
              - cluster.local/ns/staging/sa/sampledata
      to:
        - operation:
            ports:
              - "80"
              - "8090"
