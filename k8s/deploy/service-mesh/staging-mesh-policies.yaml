apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: staging-default-istio-mutual
  namespace: staging
spec:
  host: "*.staging.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: staging-default-istio-mutual-global
  namespace: istio-system
spec:
  exportTo:
    - "*"
  host: "*.staging.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: staging-search-retry-policy
  namespace: staging
spec:
  hosts:
    - search.staging.svc.cluster.local
  http:
    - match:
        - port: 80
      route:
        - destination:
            host: search.staging.svc.cluster.local
            port:
              number: 80
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,connect-failure,refused-stream,gateway-error,reset
      timeout: 10s
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: staging-product-allow-metrics-scrape
  namespace: staging
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    - to:
        - operation:
            ports:
              - "8090"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
