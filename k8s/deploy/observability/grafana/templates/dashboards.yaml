apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: yas-observability-dashboard
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  url: "https://raw.githubusercontent.com/JakeConal/yas/main/docker/grafana/provisioning/dashboards/observability_dashboard.json"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: jvm-dashboard
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  url: "https://grafana.com/api/dashboards/4701/revisions/10/download"
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: hikari-cp-dashboard
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  url: "https://grafana.com/api/dashboards/6083/revisions/5/download"
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
