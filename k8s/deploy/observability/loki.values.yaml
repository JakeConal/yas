write:
  replicas: 1
read:
  replicas: 1
backend:
  replicas: 1
loki:
  commonConfig:
    replication_factor: 1
  auth_enabled: false
test:
  enabled: false
storage:
  type: 'filesystem'
minio:
  enabled: true

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

# Memory tuning for single-node minikube (default 8GB chunks-cache + 1GB
# results-cache saturate the node and starve other pods of scheduling room).
chunksCache:
  allocatedMemory: 256
  allocatedCPU: 100m
resultsCache:
  allocatedMemory: 128
  allocatedCPU: 100m