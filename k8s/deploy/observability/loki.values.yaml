write:
  replicas: 1
read:
  replicas: 1
backend:
  replicas: 1
loki:
  commonConfig:
    replication_factor: 1
  auth_enabled: false
  useTestSchema: true
  storage:
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
test:
  enabled: false
storage:
  type: 'filesystem'
minio:
  enabled: true

chunksCache:
  allocatedMemory: 1024

resultsCache:
  allocatedMemory: 256

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
