apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  project: yas-infrastructure
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 27.0.14
    helm:
      valuesObject:
        auth:
          password: redis
  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
