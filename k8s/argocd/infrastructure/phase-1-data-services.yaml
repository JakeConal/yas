apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-cluster
  namespace: argocd
spec:
  project: yas-infrastructure
  source:
    repoURL: https://github.com/JakeConal/yas.git
    targetRevision: codex/gke-infra-argocd
    path: k8s/deploy/postgres/postgresql
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
