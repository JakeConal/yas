apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: akhq
  namespace: argocd
spec:
  project: yas-infrastructure
  sources:
    - repoURL: https://akhq.io/
      chart: akhq
      targetRevision: 0.26.0
      helm:
        valueFiles:
          - $values/k8s/deploy/kafka/akhq.values.yaml
    - repoURL: https://github.com/JakeConal/yas.git
      targetRevision: codex/gke-infra-argocd
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
