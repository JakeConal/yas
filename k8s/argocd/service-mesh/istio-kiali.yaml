apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: yas-infrastructure
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
        - .webhooks[]?.clientConfig.service.port
        - .webhooks[]?.failurePolicy
        - .webhooks[]?.matchPolicy
        - .webhooks[]?.namespaceSelector
        - .webhooks[]?.objectSelector
        - .webhooks[]?.rules[]?.scope
        - .webhooks[]?.timeoutSeconds
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    targetRevision: 1.30.2
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: yas-infrastructure
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
        - .webhooks[]?.clientConfig.service.port
        - .webhooks[]?.failurePolicy
        - .webhooks[]?.matchPolicy
        - .webhooks[]?.namespaceSelector
        - .webhooks[]?.objectSelector
        - .webhooks[]?.rules[]?.scope
        - .webhooks[]?.timeoutSeconds
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: 1.30.2
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kiali
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: yas-infrastructure
  sources:
    - repoURL: https://kiali.org/helm-charts
      chart: kiali-server
      targetRevision: 2.28.0
      helm:
        releaseName: kiali-server
        valueFiles:
          - $values/k8s/deploy/service-mesh/kiali.values.yaml
    - repoURL: https://github.com/JakeConal/yas.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kiali-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-mesh-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: yas-infrastructure
  source:
    repoURL: https://github.com/JakeConal/yas.git
    targetRevision: main
    path: k8s/deploy/service-mesh
    directory:
      include: "{mesh-policies.yaml,staging-mesh-policies.yaml,istio-sidecar-podmonitor.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
