apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cart
  namespace: argocd
spec:
  project: yas-infrastructure
  source:
    repoURL: https://github.com/JakeConal/yas.git
    targetRevision: codex/gke-infra-argocd
    path: k8s/charts/cart
  destination:
    server: https://kubernetes.default.svc
    namespace: yas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
