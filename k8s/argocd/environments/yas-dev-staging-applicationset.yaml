apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-dev-staging-services
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: dev
            namespace: dev
            targetRevision: env-dev
            storefrontHost: storefront-dev.yas.local.com
            backofficeHost: backoffice-dev.yas.local.com
            apiHost: api-dev.yas.local.com
            replicaCount: "1"
            # The current hook uses the default ServiceAccount, which product authorization denies.
            productReindexJobEnabled: "false"
          - env: staging
            namespace: staging
            targetRevision: env-staging
            storefrontHost: storefront-staging.yas.local.com
            backofficeHost: backoffice-staging.yas.local.com
            apiHost: api-staging.yas.local.com
            replicaCount: "1"
            productReindexJobEnabled: "false"
  syncPolicy:
    # Keep workloads running while migrating from per-service Applications.
    preserveResourcesOnDeletion: true
  template:
    metadata:
      name: "yas-{{ .env }}"
      labels:
        app.kubernetes.io/part-of: yas
        yas/environment: "{{ .env }}"
    spec:
      project: yas-infrastructure
      sources:
        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/yas-configuration
          helm:
            releaseName: "{{ .env }}-yas-configuration"
            parameters:
              - name: reloader.reloader.enableHA
                value: "true"
              - name: reloader.reloader.deployment.replicas
                value: "{{ .replicaCount }}"
              - name: mediaApplicationConfig.yas.publicUrl
                value: "http://{{ .storefrontHost }}/media"
              - name: paymentPaypalApplicationConfig.yas.public.url
                value: "http://{{ .storefrontHost }}/complete-payment"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/cart
          helm:
            releaseName: "{{ .env }}-cart"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/customer
          helm:
            releaseName: "{{ .env }}-customer"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/inventory
          helm:
            releaseName: "{{ .env }}-inventory"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/location
          helm:
            releaseName: "{{ .env }}-location"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/media
          helm:
            releaseName: "{{ .env }}-media"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"
              - name: backend.ingress.host
                value: "{{ .storefrontHost }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/order
          helm:
            releaseName: "{{ .env }}-order"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/payment
          helm:
            releaseName: "{{ .env }}-payment"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/payment-paypal
          helm:
            releaseName: "{{ .env }}-payment-paypal"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/product
          helm:
            releaseName: "{{ .env }}-product"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/sampledata
          helm:
            releaseName: "{{ .env }}-sampledata"
            parameters:
              - name: backend.replicaCount
                value: "0"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/search
          helm:
            releaseName: "{{ .env }}-search"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"
              - name: productReindexJob.enabled
                value: "{{ .productReindexJobEnabled }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/tax
          helm:
            releaseName: "{{ .env }}-tax"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/backoffice-bff
          helm:
            releaseName: "{{ .env }}-backoffice-bff"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"
              - name: backend.ingress.host
                value: "{{ .backofficeHost }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/storefront-bff
          helm:
            releaseName: "{{ .env }}-storefront-bff"
            parameters:
              - name: backend.replicaCount
                value: "{{ .replicaCount }}"
              - name: backend.ingress.host
                value: "{{ .storefrontHost }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/backoffice-ui
          helm:
            releaseName: "{{ .env }}-backoffice-ui"
            parameters:
              - name: ui.replicaCount
                value: "{{ .replicaCount }}"
              - name: ui.ingress.host
                value: "{{ .backofficeHost }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/storefront-ui
          helm:
            releaseName: "{{ .env }}-storefront-ui"
            parameters:
              - name: ui.replicaCount
                value: "{{ .replicaCount }}"
              - name: ui.ingress.host
                value: "{{ .storefrontHost }}"

        - repoURL: https://github.com/JakeConal/yas.git
          targetRevision: "{{ .targetRevision }}"
          path: k8s/charts/swagger-ui
          helm:
            releaseName: "{{ .env }}-swagger-ui"
            parameters:
              - name: replicaCount
                value: "{{ .replicaCount }}"
              - name: ingress.host
                value: "{{ .apiHost }}"

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
