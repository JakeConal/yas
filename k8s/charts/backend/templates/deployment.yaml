apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.deployment.annotations | nindent 4 }}
    {{- if .Values.deployment.extraAnnotations }}
      {{- toYaml .Values.deployment.extraAnnotations | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: yas-configuration
          configMap:
            name: yas-configuration-configmap
        {{- if .Values.opentelemetry.enabled }}
        - name: opentelemetry-javaagent
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes}}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if .Values.opentelemetry.enabled }}
      initContainers:
        - name: download-opentelemetry-javaagent
          image: curlimages/curl:8.11.1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - >-
              curl -fsSL
              https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v{{ .Values.opentelemetry.javaAgentVersion }}/opentelemetry-javaagent.jar
              -o {{ .Values.opentelemetry.javaAgentPath }}
          volumeMounts:
            - name: opentelemetry-javaagent
              mountPath: {{ dir .Values.opentelemetry.javaAgentPath }}
      {{- end }}
      containers:
        - name: {{ include "backend.fullname" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                name: yas-postgresql-credentials-secret
            {{- with .Values.extraEnvFroms }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- if .Values.opentelemetry.enabled }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:{{ .Values.opentelemetry.javaAgentPath }}"
            - name: OTEL_SERVICE_NAME
              value: {{ include "backend.fullname" . | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.namespace.name=$(POD_NAMESPACE),deployment.environment=$(POD_NAMESPACE)"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.opentelemetry.collectorEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.opentelemetry.protocol | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.opentelemetry.tracesExporter | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.opentelemetry.metricsExporter | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.opentelemetry.logsExporter | quote }}
            {{- end }}
            - name: LOGGING_CONFIG
              value: {{ .Values.logbackXmlPath }}
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.databaseConnectionUrl }}/{{ .Values.databaseName }}
            {{- if .Values.extraApplicationConfigPaths }}
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: /opt/yas/config/application.yaml,{{ join "," .Values.extraApplicationConfigPaths }}
            {{- else }}
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: /opt/yas/config/application.yaml
            {{- end }}
            {{- with .Values.extraEnvs }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - mountPath: /opt/yas/config
              name: yas-configuration
            {{- if .Values.opentelemetry.enabled }}
            - mountPath: {{ dir .Values.opentelemetry.javaAgentPath }}
              name: opentelemetry-javaagent
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.httpPort }}
              protocol: TCP
            - name: metric
              containerPort: {{ .Values.metricPort }}
          lifecycle:
            {{ toYaml .Values.lifecycle | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
