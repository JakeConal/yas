backend:
  image:
    repository: jakecoop17/yas-media
    tag: latest

  nameOverride: media
  fullnameOverride: media
  databaseName: media
  ingress:
    enabled: false
  extraVolumes:
    - name: media-application
      configMap:
        name: media-application-configmap
    - name: media-images
      persistentVolumeClaim:
        claimName: media-images-pvc
  extraVolumeMounts:
    - name: media-application
      mountPath: /opt/yas/media
    - name: media-images
      mountPath: /mnt/media
  extraApplicationConfigPaths:
    - /opt/yas/media/media-application.yaml

imageStorage:
  enabled: false
