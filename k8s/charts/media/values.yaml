backend:
  image:
    repository: ghcr.io/nashtech-garage/yas-media
    tag: latest

  nameOverride: media
  fullnameOverride: media
  databaseName: media
  ingress:
    enabled: true
    host: storefront.yas.local.com
    path: /media
    pathType: Prefix
  extraVolumes:
    - name: media-images
      persistentVolumeClaim:
        claimName: media-images
    - name: media-application
      configMap:
        name: media-application-configmap
  extraVolumeMounts:
    - name: media-images
      mountPath: /images
    - name: media-application
      mountPath: /opt/yas/media
  extraApplicationConfigPaths:
    - /opt/yas/media/media-application.yaml

imageStorage:
  enabled: true
  size: 1Gi
  storageClassName: ""
