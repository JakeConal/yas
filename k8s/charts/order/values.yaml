backend:
  image:
    repository: asia-southeast1-docker.pkg.dev/encoded-antenna-501811-p4/yas-docker/yas-order
    tag: latest

  nameOverride: order
  fullnameOverride: order
  databaseName: order
  ingress:
    enabled: false
  extraVolumes:
    - name: order-application-config
      configMap:
        name: order-application-configmap
  extraVolumeMounts:
    - name: order-application-config
      mountPath: /opt/yas/order
  extraApplicationConfigPaths:
    - /opt/yas/order/order-application.yaml
  extraObjects:
    - apiVersion: batch/v1
      kind: Job
      metadata:
        name: order-schema-compat
        annotations:
          argocd.argoproj.io/hook: PreSync
          argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
      spec:
        backoffLimit: 3
        ttlSecondsAfterFinished: 600
        template:
          spec:
            restartPolicy: Never
            containers:
              - name: migrate
                image: postgres:15-alpine
                imagePullPolicy: IfNotPresent
                env:
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: yas-postgresql-credentials-secret
                        key: POSTGRESQL_PASSWORD
                  - name: POSTGRESQL_USERNAME
                    valueFrom:
                      secretKeyRef:
                        name: yas-postgresql-credentials-secret
                        key: POSTGRESQL_USERNAME
                command:
                  - sh
                  - -ec
                  - |
                    psql -h postgresql.postgres -U "$POSTGRESQL_USERNAME" -d "order" <<'SQL'
                    ALTER TABLE IF EXISTS "checkout"
                      ALTER COLUMN customer_id DROP DEFAULT,
                      ALTER COLUMN customer_id TYPE varchar(255) USING customer_id::varchar;

                    ALTER TABLE IF EXISTS "order"
                      ALTER COLUMN customer_id DROP DEFAULT,
                      ALTER COLUMN customer_id TYPE varchar(255) USING customer_id::varchar;
                    SQL
